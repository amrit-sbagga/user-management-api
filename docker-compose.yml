services:
  mysql-db:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: user_mgmt_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: user-management-app
    depends_on:
      - mysql-db
    ports:
      - "8080:8080"
    environment:
      DB_PASSWORD: root
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/user_mgmt_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root

volumes:
  mysql_data: